name: rental_hub
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  animated_toggle_switch: ^0.8.7
  bloc: ^9.2.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  data_connection_checker_tv: ^0.3.5-nullsafety
  dio: ^5.9.2
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localization: ^0.4.0
  flutter_rating_stars: ^1.1.0
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.2.4
  get_it: ^9.2.1
  go_router: ^14.6.2
  go_transitions: ^0.8.3
  lottie: ^3.3.2
  meta: ^1.17.0
  pin_code_fields: ^9.3.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:

    - family: HindSiliguri
      fonts:
        - asset: assets/fonts/HindSiliguri-SemiBold.ttf
          
    - family: InstrumentSans
      fonts:
        - asset: assets/fonts/InstrumentSans_Condensed-Bold.ttf
          weight: 700
        - asset: assets/fonts/InstrumentSans_Condensed-Regular.ttf
          weight: 400
flutter_intl:
  enabled: true
